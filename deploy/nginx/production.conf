server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${DOMAIN};

    ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN}/chain.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 11m;
    limit_conn per_ip 20;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /api/stopcards {
        limit_req zone=stopcard_submit burst=15 nodelay;
        proxy_request_buffering off;
        proxy_pass http://stopcard_api;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location = /api/admin/auth/login {
        limit_req zone=admin_login burst=5 nodelay;
        proxy_pass http://stopcard_api;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location ^~ /api/ {
        proxy_pass http://stopcard_api;
        include /etc/nginx/snippets/proxy-common.conf;
    }

    location ^~ /health/ {
        proxy_pass http://stopcard_api;
        include /etc/nginx/snippets/proxy-common.conf;
        access_log off;
    }

    # Presigned MinIO URLs use this public host. Preserve Host and query string,
    # otherwise AWS Signature V4 verification fails.
    location ^~ /${MINIO_BUCKET}/stopcards/ {
        limit_except GET HEAD { deny all; }
        proxy_pass http://stopcard_minio;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering on;
        proxy_hide_header Server;
    }

    location / {
        return 404;
    }
}
