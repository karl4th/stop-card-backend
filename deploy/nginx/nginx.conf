user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" request_time=$request_time '
                    'upstream_time=$upstream_response_time';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 30s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json application/javascript text/css text/plain;

    limit_req_zone $binary_remote_addr zone=stopcard_submit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=admin_login:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=per_ip:10m;

    upstream stopcard_api {
        server api:8000;
        keepalive 32;
    }

    upstream stopcard_minio {
        server minio:9000;
        keepalive 16;
    }

    include /etc/nginx/conf.d/*.conf;
}
