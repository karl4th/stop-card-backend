server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location = /health/live {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    location / {
        return 404;
    }
}
